services:
  backend:
    build: ./backend
    container_name: optionspanel-api
    restart: unless-stopped
    ports:
      - "7188:7188"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7188/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./optionpanel
      args:
        API_PROXY_TARGET: http://backend:7188
    container_name: optionspanel-web
    restart: unless-stopped
    ports:
      - "7189:7189"
    depends_on:
      backend:
        condition: service_healthy
